name: CI & Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build core
        run: npm run build -w packages/core
      - name: Test core (47 unit tests)
        run: npm run test -w packages/core
      - name: Build @spendlens/react
        run: npm run build -w packages/react
      - name: Build extension
        run: npm run build -w packages/extension
      - name: Copy extension assets
        run: node packages/extension/scripts/copy-assets.mjs
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: spendlens-extension-${{ github.sha }}
          path: packages/extension/dist/

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
      - run: npm run build -w packages/core
      - run: npm run build -w packages/react
      - name: Publish spendlens
        run: npm publish --workspace packages/core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @spendlens/react
        run: npm publish --workspace packages/react --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build -w packages/core
      - run: npm run build -w packages/extension
      - run: node packages/extension/scripts/copy-assets.mjs
      - run: zip -r spendlens-extension.zip packages/extension/dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: spendlens-extension.zip
          generate_release_notes: true
          body: |
            ## Installation

            **npm**
            ```bash
            npm install spendlens
            npm install @spendlens/react
            ```

            **Browser Extension**
            Download `spendlens-extension.zip`, unzip, load as unpacked extension in Chrome or Firefox.
